# Pull Events tab from Google Sheet → sheet-events.json → commit → deploy (via your host).
#
# Requires: Sheet CSV export is reachable (share sheet: Anyone with the link → Viewer).
# If you use Netlify/Vercel connected to this repo, a push to main redeploys the site.

name: Sync events from Google Sheet

on:
  schedule:
    # Every 2 days at 2:00 PM UTC — keep in sync with src/data/sync-config.json
    - cron: '0 14 */2 * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-events
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync Events tab
        run: npm run sync-events

      - name: Sync Submissions tab
        run: npm run sync-submissions

      - name: Verify build
        run: npm run build

      - name: Commit synced data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/sheet-events.json src/data/sheet-submissions.json src/data/sync-meta.json data/events-export.csv
          if git diff --staged --quiet; then
            echo "No sheet changes — skipping commit."
            echo "pushed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: sync events from Google Sheet"
            git push
            echo "pushed=true" >> "$GITHUB_OUTPUT"
          fi
        id: commit

      - name: Revalidate event metadata cache
        if: steps.commit.outputs.pushed == 'true'
        env:
          REVALIDATE_SECRET: ${{ secrets.REVALIDATE_SECRET }}
        run: |
          if [ -z "$REVALIDATE_SECRET" ]; then
            echo "REVALIDATE_SECRET not configured — skipping on-demand revalidation."
            exit 0
          fi
          curl -fsS -X POST "https://puddlesmap.com/api/revalidate?secret=${REVALIDATE_SECRET}" || \
          echo "Revalidation request failed — deploy will still refresh metadata on next build."
