[build]
  command = "npm run build"
  publish = ".next"
  functions = "netlify/functions"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# PostHog reverse proxy (Netlify redirects — Next.js rewrites corrupt Content-Encoding here)
[[redirects]]
  from = "/ingest/static/*"
  to = "https://us-assets.i.posthog.com/static/:splat"
  host = "us-assets.i.posthog.com"
  status = 200
  force = true

[[redirects]]
  from = "/ingest/array/*"
  to = "https://us-assets.i.posthog.com/array/:splat"
  host = "us-assets.i.posthog.com"
  status = 200
  force = true

[[redirects]]
  from = "/ingest/*"
  to = "https://us.i.posthog.com/:splat"
  host = "us.i.posthog.com"
  status = 200
  force = true

[[redirects]]
  from = "/api/sheet-api"
  to = "/.netlify/functions/sheet-api"
  status = 200

[[redirects]]
  from = "/api/admin-auth"
  to = "/.netlify/functions/admin-auth"
  status = 200

[[redirects]]
  from = "/api/sheet-csv"
  to = "/.netlify/functions/sheet-csv"
  status = 200

[[redirects]]
  from = "/api/sheet-submissions-csv"
  to = "/.netlify/functions/sheet-submissions-csv"
  status = 200

[[redirects]]
  from = "/api/trigger-sync"
  to = "/.netlify/functions/trigger-sync"
  status = 200
