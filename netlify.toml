[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[[redirects]]
  from = "/api/sheet-api"
  to = "/.netlify/functions/sheet-api"
  status = 200

[[redirects]]
  from = "/api/sheet-csv"
  to = "https://docs.google.com/spreadsheets/d/1ko8p-HMzXMnSHT8qPxv14X-TPaac0RJTrfw8PwjikH8/export?format=csv&gid=1023308778"
  status = 200
  force = true

[[redirects]]
  from = "/api/sheet-submissions-csv"
  to = "https://docs.google.com/spreadsheets/d/1ko8p-HMzXMnSHT8qPxv14X-TPaac0RJTrfw8PwjikH8/export?format=csv&gid=1055272051"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
